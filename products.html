<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفاصيل المنتج</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .product-img {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 8px;
        }
        .product-title {
            font-size: 28px;
            margin: 20px 0 10px 0;
            color: #333;
        }
        .product-price {
            font-size: 22px;
            font-weight: bold;
            color: #e44d26;
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container" id="product-details">
    <p>جاري تحميل تفاصيل المنتج...</p>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const productIndex = urlParams.get('index');

    fetch('products.json')
        .then(response => response.json())
        .then(productsDb => {
            if (productIndex !== null && productsDb[productIndex]) {
                const product = productsDb[productIndex];
                
                document.getElementById('product-details').innerHTML = `
                    <img src="${product.image}" class="product-img" alt="${product.name}">
                    <h1 class="product-title">${product.name}</h1>
                    <div class="product-price">${product.price || '75 EPT'}</div>
                    <a href="index.html" class="back-btn">العودة للرئيسية</a>
                `;
            } else {
                document.getElementById('product-details').innerHTML = `<p>عذراً، لم يتم العثور على المنتج المطلوب.</p>`;
            }
        })
        .catch(error => {
            console.error("حدث خطأ أثناء تحميل المنتج:", error);
            document.getElementById('product-details').innerHTML = `<p>حدث خطأ في تحميل البيانات.</p>`;
        });
</script>

</body>
</html>
